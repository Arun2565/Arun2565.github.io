---
layout: default
title: Writing
permalink: /writing/
---

<div class="search-wrap">
  <span class="search-glyph">⌕</span>
  <input class="search-input" id="search" type="text" placeholder="search by title or tag" oninput="filterPosts(this.value)" />
</div>

<div class="sec-head">
  <div class="sec-title">Writing</div>
  <div class="sec-line"></div>
</div>

<div class="post-list" id="post-list">
  {% for post in site.posts %}
    {% if post.category != 'daily' %}
  <a class="post-item" href="{{ post.url }}" data-tags="{{ post.tags | join: ' ' }}">
    <div class="post-left">
      <span class="post-title">{{ post.title }}</span>
      {% if post.category %}
      <span class="post-tag {{ post.category }}">{{ post.category }}</span>
      {% endif %}
    </div>
    <span class="post-date">{{ post.date | date: "%Y %m %d" }}</span>
  </a>
    {% endif %}
  {% endfor %}
</div>
<div class="no-results" id="no-results">no posts found.</div>
